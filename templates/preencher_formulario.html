{% extends '_layout.html' %}{% set titulo='Preencher Formulário - SINTER' %}{% block conteudo %}<h1>Preencher Formulário</h1><h2>{{ formulario.nome }}</h2><form method="POST" action="/formularios/gerar-pdf/{{ formulario.id }}">{% for pergunta in perguntas %}<label>{{ pergunta.pergunta }}</label>{% if pergunta.tipo == 'checkbox' %}<input type="checkbox" name="{{ pergunta.id }}" value="X">{% else %}<input name="{{ pergunta.id }}">{% endif %}{% endfor %}<button>Gerar PDF</button></form>{% endblock %}
